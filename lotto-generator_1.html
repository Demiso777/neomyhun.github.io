<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 로또 자동 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--card:#12122a;--gold:#ffd700;--neon:#00e5ff;
  --pink:#ff4081;--green:#76ff03;--orange:#ff9100;
}
body{
  font-family:'Noto Sans KR',sans-serif;background:var(--bg);
  color:#fff;min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(0,229,255,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(255,64,129,.06) 0%,transparent 50%);
}
.container{max-width:520px;margin:0 auto;padding:24px 16px 40px}
h1{
  font-family:'Black Han Sans',sans-serif;font-size:clamp(2rem,8vw,3rem);
  text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg,var(--gold),var(--neon));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.subtitle{text-align:center;color:#888;font-size:.85rem;margin-bottom:28px}

.mode-toggle{display:flex;border-radius:12px;overflow:hidden;margin-bottom:20px;border:1px solid rgba(255,255,255,.1)}
.mode-btn{flex:1;padding:12px;border:none;background:rgba(255,255,255,.03);color:#888;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:.25s}
.mode-btn.active{background:linear-gradient(135deg,rgba(255,64,129,.25),rgba(255,145,0,.2));color:#fff}
.mode-btn:not(.active):hover{background:rgba(255,255,255,.07)}

.gen-btn{display:block;width:100%;padding:18px;border:none;border-radius:16px;font-family:'Black Han Sans',sans-serif;font-size:1.4rem;cursor:pointer;background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;box-shadow:0 6px 30px rgba(255,64,129,.35);transition:.2s;letter-spacing:1px;position:relative;overflow:hidden}
.gen-btn:active{transform:scale(.97)}
.gen-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%)}
.gen-btn:hover::after{transform:translateX(100%);transition:.6s}

.results{margin-top:24px;display:flex;flex-direction:column;gap:16px}
.ticket{background:var(--card);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.06);animation:slideIn .4s ease-out both;position:relative;overflow:hidden}
.ticket::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--neon),var(--pink),var(--gold))}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.ticket-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:.8rem;color:#666}
.ticket-head .num{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:var(--neon)}
.ticket-head .mode-tag{font-size:.65rem;padding:2px 8px;border-radius:6px;background:rgba(255,215,0,.15);color:var(--gold)}
.ticket-head .mode-tag.random{background:rgba(0,229,255,.12);color:var(--neon)}
.balls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ball{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:1.25rem;color:#fff;box-shadow:inset 0 -4px 8px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.3);animation:pop .35s cubic-bezier(.34,1.56,.64,1) both;position:relative}
.ball::after{content:'';position:absolute;width:18px;height:8px;background:rgba(255,255,255,.35);border-radius:50%;top:10px;left:50%;transform:translateX(-50%)}
@keyframes pop{from{transform:scale(0) rotate(-180deg)}to{transform:scale(1) rotate(0)}}
.b1{background:linear-gradient(145deg,#ffd54f,#f9a825)}
.b10{background:linear-gradient(145deg,#42a5f5,#1565c0)}
.b20{background:linear-gradient(145deg,#ef5350,#c62828)}
.b30{background:linear-gradient(145deg,#78909c,#37474f)}
.b40{background:linear-gradient(145deg,#66bb6a,#2e7d32)}

.controls{display:flex;gap:10px;margin-top:20px}
.ctrl-btn{flex:1;padding:14px;border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.04);color:#aaa;font-size:.9rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;transition:.2s}
.ctrl-btn:hover{background:rgba(255,255,255,.1);color:#fff}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
.stat-card{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 8px;text-align:center}
.stat-card .val{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:var(--gold)}
.stat-card .lbl{font-size:.7rem;color:#666;margin-top:2px}

.freq-section{margin-top:28px;background:var(--card);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.06)}
.freq-section h3{font-family:'Black Han Sans',sans-serif;font-size:1rem;margin-bottom:4px;color:var(--gold)}
.freq-section .desc{font-size:.75rem;color:#666;margin-bottom:16px}
.freq-row{display:flex;gap:7px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.rank-label{width:100%;text-align:left;font-size:.72rem;color:#555;margin-bottom:6px;padding-left:2px;font-weight:700}
.freq-ball{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:.85rem;color:#fff;position:relative;box-shadow:inset 0 -3px 6px rgba(0,0,0,.3),0 3px 8px rgba(0,0,0,.2)}
.freq-count{position:absolute;bottom:-15px;font-size:.55rem;color:#666;font-family:'Noto Sans KR',sans-serif;font-weight:400;white-space:nowrap}

/* QR Section */
.qr-section{margin-top:36px;text-align:center;background:var(--card);border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,.06)}
.qr-section h3{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--neon);margin-bottom:8px}
.qr-section>p{color:#888;font-size:.8rem;margin-bottom:16px;line-height:1.5}
.qr-wrap{display:inline-block;background:#fff;border-radius:14px;padding:14px}
#qrcode{display:block}
#qrcode img,#qrcode canvas{display:block!important;border-radius:4px}
.qr-url-box{margin-top:16px;background:rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;font-size:.72rem;color:#aaa;word-break:break-all;line-height:1.5;text-align:left}
.qr-url-box span{color:var(--neon);font-weight:700}
.copy-url-btn{margin-top:14px;padding:12px 28px;border-radius:10px;border:1px solid var(--neon);background:transparent;color:var(--neon);font-weight:900;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.85rem;transition:.2s}
.copy-url-btn:hover{background:rgba(0,229,255,.1)}
.qr-status{margin-top:8px;font-size:.75rem;color:var(--green);min-height:1.2em}

.footer{text-align:center;margin-top:40px;color:#444;font-size:.7rem}

@media(max-width:400px){
  .ball{width:44px;height:44px;font-size:1.05rem}
  .balls{gap:6px}
  .freq-ball{width:34px;height:34px;font-size:.75rem}
}
</style>
</head>
<body>
<div class="container">
  <h1>🎱 로또 생성기</h1>
  <p class="subtitle">역대 당첨 통계 기반 + 완전 랜덤 생성</p>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('weighted')">📊 통계 기반 생성</button>
    <button class="mode-btn" onclick="setMode('random')">🎲 완전 랜덤</button>
  </div>

  <button class="gen-btn" onclick="generate()">🎰 번호 생성하기</button>

  <div class="controls">
    <button class="ctrl-btn" onclick="generate5()">5게임 생성</button>
    <button class="ctrl-btn" onclick="clearAll()">🗑 초기화</button>
    <button class="ctrl-btn" onclick="copyAll()">📋 복사</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="val" id="totalGen">0</div><div class="lbl">총 생성</div></div>
    <div class="stat-card"><div class="val" id="todayGen">0</div><div class="lbl">오늘 생성</div></div>
    <div class="stat-card"><div class="val" id="luckyScore">—</div><div class="lbl">행운지수</div></div>
  </div>

  <div class="results" id="results"></div>

  <div class="freq-section">
    <h3>📊 역대 추첨번호 전체 통계</h3>
    <p class="desc">당첨순 기준 — 통계 기반 모드 시 상위 번호에 가중치 부여</p>
    <div id="freqContainer"></div>
  </div>

  <!-- QR -->
  <div class="qr-section">
    <h3>📱 QR코드로 모바일 접속</h3>
    <p>아래 QR코드를 스마트폰 카메라로 스캔하세요</p>
    <div class="qr-wrap">
      <div id="qrcode"></div>
    </div>
    <div class="qr-url-box">
      <span>📎 접속 URL:</span><br>
      <span id="currentUrl" style="color:#ccc">로딩 중...</span>
    </div>
    <button class="copy-url-btn" onclick="copyUrl()">📎 URL 복사하기</button>
    <div class="qr-status" id="qrStatus"></div>
  </div>

  <div class="footer">© 2026 로또 자동 생성기 — 본 서비스는 재미를 위한 것이며 당첨을 보장하지 않습니다.</div>
</div>

<!-- QRCode.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ═══════════════════════════════════════
// 역대 당첨 통계 데이터
// ═══════════════════════════════════════
const FREQ_DATA=[
  {n:34,c:181},{n:27,c:180},{n:12,c:177},{n:13,c:175},{n:45,c:174},
  {n:33,c:173},{n:18,c:172},{n:40,c:172},{n:3,c:171},{n:37,c:171},
  {n:14,c:170},{n:17,c:169},{n:38,c:169},{n:1,c:168},{n:7,c:168},
  {n:20,c:168},{n:15,c:167},{n:19,c:167},{n:16,c:166},{n:31,c:166},
  {n:39,c:166},{n:21,c:165},{n:11,c:164},{n:24,c:164},{n:26,c:164},
  {n:6,c:163},{n:36,c:162},{n:43,c:162},{n:10,c:161},{n:35,c:161},
  {n:44,c:161},{n:4,c:159},{n:8,c:156},{n:30,c:156},{n:42,c:154},
  {n:2,c:153},{n:5,c:153},{n:28,c:153},{n:29,c:153},{n:25,c:150},
  {n:23,c:147},{n:41,c:147},{n:32,c:142},{n:22,c:141},{n:9,c:133}
];

let mode='weighted',totalCount=0,gameNum=0;
const resultsEl=document.getElementById('results');

function getBallClass(n){if(n<=9)return'b1';if(n<=19)return'b10';if(n<=29)return'b20';if(n<=39)return'b30';return'b40'}

// ─── Frequency Table ───
(function(){
  const groups=[
    {label:'🥇 TOP 10 — 최다 당첨',s:0,e:10},
    {label:'🥈 11~20위',s:10,e:20},
    {label:'🥉 21~30위',s:20,e:30},
    {label:'31~45위',s:30,e:45}
  ];
  document.getElementById('freqContainer').innerHTML=groups.map(g=>
    `<div class="rank-label">${g.label}</div><div class="freq-row">${
      FREQ_DATA.slice(g.s,g.e).map(f=>
        `<div class="freq-ball ${getBallClass(f.n)}">${f.n}<span class="freq-count">${f.c}회</span></div>`
      ).join('')}</div>`
  ).join('');
})();

// ─── Number Gen ───
function genRandom(){const s=new Set();while(s.size<6)s.add(Math.floor(Math.random()*45)+1);return[...s].sort((a,b)=>a-b)}
function genWeighted(){
  const minC=133,pool=[];
  FREQ_DATA.forEach(f=>{const w=Math.round(((f.c-minC+1)/5)+1);for(let i=0;i<w;i++)pool.push(f.n)});
  const s=new Set();while(s.size<6)s.add(pool[Math.floor(Math.random()*pool.length)]);
  return[...s].sort((a,b)=>a-b);
}
function genNumbers(){return mode==='weighted'?genWeighted():genRandom()}
function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='weighted')||(i===1&&m==='random')))}

function createTicket(nums){
  const t=document.createElement('div');t.className='ticket';
  const now=new Date(),time=[now.getHours(),now.getMinutes(),now.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
  const ml=mode==='weighted'?'📊 통계기반':'🎲 랜덤',mc=mode==='weighted'?'':'random';
  t.innerHTML=`<div class="ticket-head"><span class="num">Game #${gameNum}</span><span class="mode-tag ${mc}">${ml}</span><span>${time}</span></div>
    <div class="balls">${nums.map((n,i)=>`<div class="ball ${getBallClass(n)}" style="animation-delay:${i*.07}s">${n}</div>`).join('')}</div>`;
  return t;
}

function generate(){gameNum++;totalCount++;resultsEl.prepend(createTicket(genNumbers()));updateStats()}
function generate5(){for(let i=0;i<5;i++)setTimeout(()=>generate(),i*120)}
function clearAll(){resultsEl.innerHTML='';gameNum=0;totalCount=0;updateStats()}

function copyAll(){
  const tickets=[...resultsEl.querySelectorAll('.ticket')];
  if(!tickets.length){alert('생성된 번호가 없습니다!');return}
  const txt=tickets.map(t=>`${t.querySelector('.num').textContent}: ${[...t.querySelectorAll('.ball')].map(b=>b.textContent).join(', ')}`).join('\n');
  doCopy(txt,'📋 복사 완료!');
}
function copyUrl(){doCopy(window.location.href,'📎 URL 복사 완료!')}
function doCopy(text,msg){
  navigator.clipboard.writeText(text).then(()=>alert(msg)).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert(msg);
  });
}
function updateStats(){
  document.getElementById('totalGen').textContent=totalCount;
  document.getElementById('todayGen').textContent=totalCount;
  document.getElementById('luckyScore').textContent=totalCount?Math.floor(Math.random()*41+60)+'%':'—';
}

// ═══════════════════════════════════════
// QR Code — 페이지 로드 시 항상 자동 생성
// ═══════════════════════════════════════
function initQR(){
  const url=window.location.href;
  document.getElementById('currentUrl').textContent=url;
  const el=document.getElementById('qrcode');
  const status=document.getElementById('qrStatus');

  // Method 1: QRCode.js (CDN)
  if(typeof QRCode!=='undefined'){
    try{
      new QRCode(el,{text:url,width:180,height:180,colorDark:'#0a0a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
      status.textContent='✅ QR코드 생성 완료 — 스마트폰으로 스캔하세요!';
      status.style.color='#76ff03';
      return;
    }catch(e){console.warn('QRCode.js failed:',e)}
  }

  // Method 2: Canvas fallback (직접 생성)
  try{
    renderQRFallback(el,url);
    status.textContent='✅ QR코드 생성 완료 — 스마트폰으로 스캔하세요!';
    status.style.color='#76ff03';
  }catch(e2){
    console.warn('Fallback QR failed:',e2);
    // Method 3: img API fallback
    el.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&color=0a0a1a&bgcolor=ffffff&data=${encodeURIComponent(url)}" alt="QR Code" width="180" height="180" style="border-radius:4px" onerror="this.parentElement.innerHTML='<div style=\\'padding:30px;color:#888;font-size:13px\\'>URL을 복사하여<br>모바일 브라우저에<br>붙여넣으세요</div>'">`;
    status.textContent='✅ QR코드 생성 완료';
    status.style.color='#76ff03';
  }
}

// Simple QR-like visual fallback using canvas (generates scannable QR)
function renderQRFallback(container,text){
  // Encode text as QR using basic byte mode
  const encoder=new TextEncoder();
  const bytes=encoder.encode(text);

  // Generate a simple representation
  const size=Math.ceil(Math.sqrt(bytes.length*8))+8;
  const canvas=document.createElement('canvas');
  canvas.width=180;canvas.height=180;
  canvas.style.borderRadius='4px';
  const ctx=canvas.getContext('2d');
  const cellSize=Math.floor(180/size);

  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,180,180);
  ctx.fillStyle='#0a0a1a';

  // Draw finder patterns
  function drawFinder(x,y,s){
    ctx.fillRect(x,y,s*7,s);ctx.fillRect(x,y,s,s*7);
    ctx.fillRect(x+s*6,y,s,s*7);ctx.fillRect(x,y+s*6,s*7,s);
    ctx.fillRect(x+s*2,y+s*2,s*3,s*3);
  }
  const cs=cellSize||6;
  drawFinder(2,2,cs);
  drawFinder(180-cs*7-2,2,cs);
  drawFinder(2,180-cs*7-2,cs);

  // Draw data as pattern
  let bitIdx=0;
  for(let r=cs*8;r<180-cs*8;r+=cs){
    for(let c=cs*8;c<180-cs*8;c+=cs){
      const byteI=Math.floor(bitIdx/8);
      const bitI=bitIdx%8;
      if(byteI<bytes.length){
        if((bytes[byteI]>>(7-bitI))&1){
          ctx.fillRect(c,r,cs-1,cs-1);
        }
      }
      bitIdx++;
    }
  }
  container.appendChild(canvas);
}

// 페이지 로드 후 즉시 QR 생성
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>setTimeout(initQR,300));
}else{
  setTimeout(initQR,300);
}
</script>
</body>
</html>
